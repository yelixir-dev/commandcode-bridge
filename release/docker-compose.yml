services:
  commander-commandcode-bridge:
    image: commander-commandcode-bridge:latest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env.production
    environment:
      # Container must listen on all interfaces for Docker port publishing.
      # Host exposure remains localhost-only via the ports mapping below.
      HOST: 0.0.0.0
      PORT: 9992
    ports:
      - "127.0.0.1:9992:9992"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9992/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
